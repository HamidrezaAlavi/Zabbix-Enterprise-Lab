zabbix_export:
  version: '7.0'
  host_groups:
    - uuid: f2481361f99448eea617b7b1d4765566
      name: 'Discovered hosts'
  hosts:
    - host: 'TP-LINK MODEM'
      name: 'TP-LINK MODEM'
      templates:
        - name: 'TP-LINK by SNMP'
      groups:
        - name: 'Discovered hosts'
      interfaces:
        - type: SNMP
          ip: 192.168.1.1
          port: '161'
          details:
            community: '{$SNMP_COMMUNITY}'
          interface_ref: if1
      httptests:
        - name: 'Web Scenario'
          agent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/80.0.3987.132 Safari/537.36'
          steps:
            - name: 'Load Homepage'
              url: 'https://google.com'
              follow_redirects: 'NO'
      inventory_mode: DISABLED
